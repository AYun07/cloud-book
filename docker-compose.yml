# Cloud Book AI小说创作平台 - Docker配置

## 构建镜像

```bash
# 构建所有镜像
docker-compose build

# 只构建核心服务
docker-compose build core
```

## 启动服务

```bash
# 启动所有服务
docker-compose up -d

# 查看日志
docker-compose logs -f

# 停止服务
docker-compose down
```

## 服务说明

| 服务 | 端口 | 说明 |
|------|------|------|
| web | 3000 | 前端Web应用 |
| api | 4000 | API服务 |
| redis | 6379 | Redis缓存 |
| mongodb | 27017 | MongoDB数据库 |

## 环境变量

创建 `.env` 文件：

```env
# API Keys
OPENAI_API_KEY=your-openai-key
ANTHROPIC_API_KEY=your-anthropic-key

# MongoDB
MONGODB_URI=mongodb://mongodb:27017/cloudbook

# Redis
REDIS_URL=redis://redis:6379

# JWT Secret
JWT_SECRET=your-secret-key
```

## 生产环境部署

```bash
# 使用生产配置启动
docker-compose -f docker-compose.prod.yml up -d
```
