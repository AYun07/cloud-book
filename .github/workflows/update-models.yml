name: Update LLM Models

on:
  schedule:
    # 每周一凌晨 3:00 (UTC) 自动更新模型
    - cron: '0 3 * * 1'
  
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to update (leave empty for all)'
        required: false
        default: ''
      force:
        description: 'Force update even if no changes'
        required: false
        default: 'false'

jobs:
  update-models:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check current model versions
        id: check
        run: |
          echo "当前模型统计:"
          node scripts/update-models.js --check
          
      - name: Update models
        id: update
        run: |
          if [ -n "${{ inputs.provider }}" ]; then
            echo "更新指定提供商: ${{ inputs.provider }}"
            node scripts/update-models.js --provider=${{ inputs.provider }}
          else
            echo "更新所有提供商"
            node scripts/update-models.js
          fi
          
      - name: Check for changes
        id: git_status
        run: |
          if git_diff=$(git diff --stat); then
            echo "Changes found:"
            echo "$git_diff"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.git_status.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: 更新 LLM 模型列表'
          title: '🤖 更新 LLM 模型列表'
          body: |
            ## 模型更新报告
            
            本 PR 更新了支持的 LLM 模型列表。
            
            ### 更新内容
            - 新的模型版本
            - 新增模型
            - 过时模型移除
            
            请检查更新内容并确认无误后合并。
            
            _此 PR 由自动更新工作流生成_
          branch: update/models-$(date +%Y%m%d)
          delete-branch: true
          
      - name: Send notification
        if: steps.git_status.outputs.has_changes == 'true'
        run: |
          echo "✅ 模型更新完成，已创建 PR"
          
      - name: No changes message
        if: steps.git_status.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ 没有检测到模型更新"
