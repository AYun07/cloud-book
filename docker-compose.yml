version: '3.8'

services:
  # 前端 Web 应用
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    volumes:
      - ./packages/web:/app
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:4000
    networks:
      - cloudbook

  # API 服务
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.core
    ports:
      - "4000:4000"
    volumes:
      - ./packages/core:/app
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/cloudbook
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    networks:
      - cloudbook

  # MongoDB 数据库
  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cloudbook

  # Redis 缓存
  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloudbook

  # 可选：本地 LLM 服务 (Ollama)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - cloudbook

volumes:
  mongodb_data:
  redis_data:
  ollama_data:

networks:
  cloudbook:
    driver: bridge
